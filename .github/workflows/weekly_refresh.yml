name: Weekly Outreach Refresh

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC (4am EST)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Census surname file
        run: |
          curl -s https://www2.census.gov/topics/genealogy/2010surnames/names.zip -o /tmp/names.zip
          unzip -p /tmp/names.zip "*.csv" > Names_2010Census.csv

      - name: Fetch all homeowners (20 miles, 1 year)
        run: python find_all_homeowners_20mi.py

      - name: Generate website
        run: python generate_site.py

      - name: Commit and push updated data + site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/all_homeowners_20mi.csv all_homeowners_20mi.csv
          git diff --staged --quiet || git commit -m "Weekly refresh $(date +'%Y-%m-%d')"
          git push
