name: Weekly Outreach Refresh

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC (4am EST)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci
        working-directory: app

      - name: Download Census surname file
        run: |
          curl -s https://www2.census.gov/topics/genealogy/2010surnames/names.zip -o /tmp/names.zip
          unzip -p /tmp/names.zip "*.csv" > Names_2010Census.csv

      - name: Fetch all homeowners (20 miles, 1 year)
        run: python find_all_homeowners_20mi.py

      - name: Build React app
        run: npm run build
        working-directory: app
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
